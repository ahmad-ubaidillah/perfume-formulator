<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PerfumersWorld Raw Material Library</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand" onclick="event.preventDefault(); closeModal(); loadProducts();">
        <i class="fas fa-flask"></i> PerfumersWorld Library
      </a>
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search: name, odour, synonym, CAS..."
               value="" class="search-input" onkeydown="if(event.key==='Enter')doSearch()">
        <select id="abcFilter" class="abc-select" onchange="doSearch()">
          <option value="">All ABC Donuts</option>
        </select>
        <button class="search-btn" onclick="doSearch()"><i class="fas fa-search"></i></button>
        <button class="clear-btn" onclick="clearFilters()" id="clearBtn" style="display:none">
          <i class="fas fa-times"></i> Clear
        </button>
      </div>
      <div class="nav-stats">
        <span class="stat" id="statTotal"><i class="fas fa-database"></i> 0</span>
        <span class="stat" id="statCount"><i class="fas fa-filter"></i> 0</span>
      </div>
    </div>
  </nav>

  <!-- QUICK ABC FILTER PILLS -->
  <div class="quick-filters" id="quickFilters">
    <span class="filter-label"><i class="fas fa-layer-group"></i> Quick ABC:</span>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="mainContent">
    <!-- Products grid rendered by JS -->
  </main>

  <!-- DETAIL MODAL -->
  <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>Data from <a href="https://www.perfumersworld.com" target="_blank">PerfumersWorld.com</a> | PerfumersWorld Raw Material Library</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
